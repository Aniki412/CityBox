<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CityBox</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #1a1a1a;
      color: #c0c0c0;
      font-family: 'Courier New', Courier, monospace;
      line-height: 1;
    }
    #game-container {
      width: 100%;
      min-height: 100vh;
    }
    #header {
      border-bottom: 1px solid #444;
      position: sticky;
      top: 0;
      background-color: #1a1a1a;
      z-index: 100;
    }
    #resources-bar {
      padding: 8px 20px;
      border-bottom: 1px solid #444;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #resources-left {
      display: flex;
      gap: 30px;
    }
    #menu-tabs {
      display: flex;
      border-bottom: 1px solid #444;
    }
    .menu-tab {
      padding: 8px 30px;
      text-align: center;
      cursor: pointer;
      border-right: 1px solid #444;
      transition: all 0.2s;
      background-color: #1a1a1a;
      color: #c0c0c0;
      border-top: none;
      border-left: none;
      border-bottom: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
    }
    .menu-tab:hover {
      background-color: #2a2a2a;
      color: #fff;
    }
    .menu-tab.active {
      background-color: #333;
      color: #fff;
    }
    #settings-bar {
      padding: 6px 20px;
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }
    .settings-btn {
      background-color: #1a1a1a;
      color: #c0c0c0;
      border: 1px solid #444;
      padding: 4px 12px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .settings-btn:hover {
      background-color: #333;
      color: #fff;
    }
    #main-area {
      padding: 20px 40px;
      min-height: calc(100vh - 120px);
      font-size: 14px;
      display: flex;
      justify-content: center;
    }
    .main-content {
      width: 100%;
      max-width: 1100px;
    }
    .content-section {
      display: none;
    }
    .content-section.active {
      display: block;
    }
    #settings-content {
      white-space: pre-wrap;
      text-align: center;
    }
    #cityhall-content.active {
      display: block;
    }
    #inventory-content.active {
      display: flex;
      justify-content: center;
    }
    #map-content.active {
      display: flex;
      justify-content: center;
    }
    .cityhall-wrapper {
      display: flex;
      justify-content: center;
      gap: 60px;
      margin-top: 20px;
    }
    .cityhall-left, .cityhall-right {
      font-family: 'Courier New', Courier, monospace;
      white-space: pre;
      line-height: 1.4;
      font-size: 13px;
    }
    .cityhall-center {
      font-family: 'Courier New', Courier, monospace;
      white-space: pre;
      line-height: 1.4;
      font-size: 13px;
      text-align: center;
      margin-top: 40px;
    }
    .game-button {
      background-color: #1a1a1a;
      color: #c0c0c0;
      border: 1px solid #444;
      padding: 8px 16px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }
    .game-button:hover {
      background-color: #333;
      color: #fff;
    }
    .game-button:disabled {
      color: #555;
      cursor: not-allowed;
    }
    .hidden {
      display: none !important;
    }
    .tooltip {
      position: fixed;
      background-color: #2a2a2a;
      border: 1px solid #555;
      padding: 8px 12px;
      font-size: 12px;
      color: #c0c0c0;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
      display: none;
    }
    .tooltip-title { color: #fff; font-weight: bold; margin-bottom: 4px; }
    .tooltip-cost { color: #ffcc00; }
    .tooltip-effect { color: #88ff88; margin-top: 2px; }
    #ending-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 9999;
    }
    #ending-overlay.active {
      display: flex;
    }
    #ending-overlay.fading {
      background: rgba(255,255,255,1);
      transition: background 3s ease;
    }
    #ending-overlay .ending-text {
      background: #000;
      color: #fff;
      padding: 40px;
      border: 2px solid #fff;
      font-family: monospace;
      white-space: pre-wrap;
      text-align: center;
      max-width: 600px;
      cursor: pointer;
    }
    #map-display, #shop-display, #skills-display, #battle-display, #dungeon-display, #greed-display {
      font-family: 'Courier New', Courier, monospace;
      white-space: pre;
      line-height: 1.15;
      font-size: 13px;
    }
    .building-clickable {
      color: #88ff88;
      cursor: pointer;
    }
    .building-clickable:hover {
      color: #fff;
      text-shadow: 0 0 5px #88ff88;
    }
    .building-built {
      color: #88ff88;
    }
    .building-locked {
      color: #555;
      cursor: pointer;
    }
    .building-locked:hover {
      color: #888;
    }
    .clickable {
      cursor: pointer;
    }
    .clickable:hover {
      color: #fff;
    }
    .shop-item {
      color: #ffcc00;
      cursor: pointer;
    }
    .shop-item:hover {
      color: #fff;
      text-shadow: 0 0 5px #ffcc00;
    }
    #inventory-display {
      font-family: 'Courier New', Courier, monospace;
      white-space: pre;
      line-height: 1.15;
      font-size: 13px;
      display: inline-block;
      text-align: left;
    }
    .equip-select {
      background-color: #1a1a1a;
      color: #c0c0c0;
      border: 1px solid #555;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      padding: 2px 5px;
      cursor: pointer;
      width: 18ch;
    }
    .skill-btn {
      color: #88ccff;
      cursor: pointer;
    }
    .skill-btn:hover {
      color: #fff;
      text-shadow: 0 0 5px #88ccff;
    }
    .skill-owned {
      color: #88ff88;
    }
    .safe-art {
      color: #888;
      cursor: pointer;
    }
    .safe-art:hover {
      color: #aaa;
    }
    .gamble-win { color: #88ff88; }
    .gamble-lose { color: #ff6666; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="header">
      <div id="resources-bar">
        <div id="resources-left">
          <span>Money: <span id="money">0</span></span>
          <span>Energy: <span id="energy">0</span></span>
        </div>
        <div id="resources-right">
          <span>CityBox v6.7</span>
        </div>
      </div>
      <div id="menu-tabs">
        <button class="menu-tab active" data-tab="cityhall">CITY HALL</button>
        <button class="menu-tab" data-tab="inventory">INVENTORY</button>
        <button class="menu-tab" data-tab="map">MAP</button>
        <button class="menu-tab" data-tab="settings">SETTINGS</button>
      </div>
      <div id="settings-bar">
        <button class="settings-btn" onclick="saveGame()">SAVE</button>
        <button class="settings-btn" onclick="loadGame()">LOAD</button>
        <button class="settings-btn" onclick="resetGame()">RESET</button>
      </div>
    </div>

    <div class="tooltip" id="tooltip">
      <div class="tooltip-title"></div>
      <div class="tooltip-cost"></div>
      <div class="tooltip-effect"></div>
    </div>

    <div id="main-area">
      <div class="main-content">
        <div id="cityhall-content" class="content-section active">
          <div id="cityhall-display"></div>
          <div id="greed-view" class="hidden">
            <div id="greed-display"></div>
          </div>
        </div>

        <div id="inventory-content" class="content-section">
          <div id="inventory-display"></div>
        </div>

        <div id="map-content" class="content-section">
          <div id="map-view">
            <div id="map-display"></div>
          </div>
          <div id="shop-view" class="hidden">
            <div id="shop-display"></div>
          </div>
          <div id="skills-view" class="hidden">
            <div id="skills-display"></div>
          </div>
          <div id="battle-view" class="hidden">
            <div id="battle-display"></div>
          </div>
          <div id="dungeon-view" class="hidden">
            <div id="dungeon-display"></div>
          </div>
        </div>

        <div id="settings-content" class="content-section">
          <div id="settings-display"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const gameState = {
      money: 0,
      energy: 0,
      moneyPerSecond: 1,
      energyPer5Seconds: 0,
      charityTotal: 0,
      gambleOdds: 10,
      gambleResult: '',
buildings: { 
        factory: false, 
        mine: false, 
        shop: false, 
        arena: false,
        academy: false,
        nuclear: false,
        school: false,
        kindergarten: false,
        windturbine: false,
        dungeon: false
      },
      academyUnlocked: false,
      inventory: [],
      equipped: { weapon: null, hat: null, armor: null, boots: null },
shopItems: {
        sword: { bought: false, cost: 50, name: 'Wooden Sword', slot: 'weapon', attack: 3, defense: 0, ranged: false },
        shield: { bought: false, cost: 75, name: 'Iron Shield', slot: 'armor', attack: 0, defense: 5, ranged: false },
        hat: { bought: false, cost: 40, name: 'Leather Cap', slot: 'hat', attack: 0, defense: 2, ranged: false },
        boots: { bought: false, cost: 60, name: 'Travel Boots', slot: 'boots', attack: 0, defense: 2, ranged: false },
        staff: { bought: false, cost: 0, name: 'Wizard Staff', slot: 'weapon', attack: 2, defense: 0, ranged: true, rangedAttack: 8 },
        steelSword: { bought: false, cost: 200, name: 'Steel Sword', slot: 'weapon', attack: 8, defense: 0, ranged: false, tier2: true },
        plateArmor: { bought: false, cost: 250, name: 'Plate Armor', slot: 'armor', attack: 0, defense: 10, ranged: false, tier2: true },
        wizardHat: { bought: false, cost: 180, name: 'Wizard Hat', slot: 'hat', attack: 2, defense: 4, ranged: false, tier2: true },
        speedBoots: { bought: false, cost: 220, name: 'Speed Boots', slot: 'boots', attack: 1, defense: 5, ranged: false, tier2: true },
        groundedBoots: { bought: false, cost: 0, name: 'Grounded Boots', slot: 'boots', attack: 0, defense: 3, ranged: false, grounded: true }
      },
  hasSafeCode: false,
  autosaveEnabled: true,
  skills: {
        fastMoney: { owned: false, moneyCost: 150, energyCost: 20, name: 'Fast Money', effect: '+1 money/sec', bonus: 1, tier: 1 },
        cheapBuilds: { owned: false, moneyCost: 200, energyCost: 30, name: 'Cheap Builds', effect: '-20% build cost', discount: 0.2, tier: 1 },
        strongArm: { owned: false, moneyCost: 180, energyCost: 25, name: 'Strong Arm', effect: '+2 base attack', attack: 2, tier: 1 },
        toughSkin: { owned: false, moneyCost: 180, energyCost: 25, name: 'Tough Skin', effect: '+2 base defense', defense: 2, tier: 1 },
        fastMoney2: { owned: false, moneyCost: 400, energyCost: 50, name: 'Fast Money II', effect: '+3 money/sec', bonus: 3, tier: 2, requires: 'fastMoney' },
        cheapBuilds2: { owned: false, moneyCost: 500, energyCost: 60, name: 'Cheap Builds II', effect: '-15% more build cost', discount: 0.15, tier: 2, requires: 'cheapBuilds' },
        strongArm2: { owned: false, moneyCost: 450, energyCost: 55, name: 'Strong Arm II', effect: '+4 base attack', attack: 4, tier: 2, requires: 'strongArm' },
        toughSkin2: { owned: false, moneyCost: 450, energyCost: 55, name: 'Tough Skin II', effect: '+4 base defense', defense: 4, tier: 2, requires: 'toughSkin' }
      },
      battleDrops: [],
      playerHP: 100,
      maxHP: 100
    };

    let battleState = {
      active: false,
      playerX: 5,
      enemyX: 45,
      playerHP: 100,
      enemyHP: 50,
      battleInterval: null,
      inCombat: false,
      enemyType: 'slime',
      projectiles: []
    };

    const tooltip = document.getElementById('tooltip');
    const tooltipTitle = tooltip.querySelector('.tooltip-title');
    const tooltipCost = tooltip.querySelector('.tooltip-cost');
    const tooltipEffect = tooltip.querySelector('.tooltip-effect');

    function showTooltip(e, title, cost, effect) {
      tooltipTitle.textContent = title;
      tooltipCost.textContent = cost || '';
      tooltipEffect.textContent = effect || '';
      tooltip.style.display = 'block';
      moveTooltip(e);
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    function moveTooltip(e) {
      tooltip.style.left = (e.clientX + 15) + 'px';
      tooltip.style.top = (e.clientY + 10) + 'px';
    }

    function getPlayerStats() {
      let attack = 1;
      let defense = 0;
      let ranged = false;
      let rangedAttack = 0;
      
      Object.values(gameState.equipped).forEach(itemId => {
        if (itemId && gameState.shopItems[itemId]) {
          attack += gameState.shopItems[itemId].attack;
          defense += gameState.shopItems[itemId].defense;
          if (gameState.shopItems[itemId].ranged) {
            ranged = true;
            rangedAttack = gameState.shopItems[itemId].rangedAttack;
          }
        }
      });
      
      if (gameState.skills.strongArm.owned) attack += gameState.skills.strongArm.attack;
      if (gameState.skills.toughSkin.owned) defense += gameState.skills.toughSkin.defense;
      if (gameState.skills.strongArm2 && gameState.skills.strongArm2.owned) attack += gameState.skills.strongArm2.attack;
      if (gameState.skills.toughSkin2 && gameState.skills.toughSkin2.owned) defense += gameState.skills.toughSkin2.defense;
      
      return { attack, defense, ranged, rangedAttack };
    }

    function getBuildCost(baseCost) {
      let discount = 0;
      if (gameState.skills.cheapBuilds.owned) discount += gameState.skills.cheapBuilds.discount;
      if (gameState.skills.cheapBuilds2 && gameState.skills.cheapBuilds2.owned) discount += gameState.skills.cheapBuilds2.discount;
      if (discount > 0) return Math.floor(baseCost * (1 - discount));
      return baseCost;
    }

    const charityThresholds = [
      { goal: 1000, hpBonus: 10 },
      { goal: 5000, hpBonus: 20 },
      { goal: 10000, hpBonus: 30 },
      { goal: 20000, hpBonus: 50 },
      { goal: 35000, hpBonus: 70 },
      { goal: 50000, hpBonus: 100 }
    ];

    function getNextCharityGoal() {
      const total = gameState.charityTotal;
      for (let t of charityThresholds) {
        if (total < t.goal) return t.goal;
      }
      const beyond = total - 50000;
      const tier = Math.floor(beyond / 50000) + 1;
      return 50000 + (tier * 50000);
    }

    function getCharityHPBonus() {
      const total = gameState.charityTotal;
      let hpBonus = 0;
      for (let t of charityThresholds) {
        if (total >= t.goal) hpBonus = t.hpBonus;
      }
      if (total >= 50000) {
        const beyond = total - 50000;
        const extraTiers = Math.floor(beyond / 50000);
        hpBonus = 100 + (extraTiers * 10);
      }
      return hpBonus;
    }
    function renderCityHall() {
      let html = '<div class="cityhall-wrapper">';

      html += '<div class="cityhall-left">';
      html += '+------------------------+\n';
      html += '|   RESOURCE GENERATION  |\n';
      html += '+------------------------+\n';
      html += '|                        |\n';
      html += '|  Money: <span id="money-rate">' + String(gameState.moneyPerSecond).padEnd(3) + '</span> /sec       |\n';
      html += '|                        |\n';
      html += '|  Energy: <span id="energy-rate">' + String(gameState.energyPer5Seconds).padEnd(2) + '</span> /5sec      |\n';
      html += '|                        |\n';
      html += '+------------------------+\n\n';
      html += '+------------------------+\n';
      html += '|       CHARITY          |\n';
      html += '+------------------------+\n';
      const nextGoal = getNextCharityGoal();
      const hpBonus = getCharityHPBonus();
      html += 'Sent: $' + gameState.charityTotal + ' / $' + nextGoal + '\n';
      html += 'HP Bonus: +' + hpBonus + ' (Max HP: ' + gameState.maxHP + ')\n\n';
      const existingInput = document.getElementById('charity-amount');
      const currentVal = existingInput ? existingInput.value : '100';
      html += '<input type="text" id="charity-amount" value="' + currentVal + '" style="width:80px;background:#1a1a1a;color:#c0c0c0;border:1px solid #444;font-family:monospace;padding:8px;">\n';
      html += '<button class="game-button" onclick="sendToCharity()">[ DONATE ]</button>\n';
      html += '</div>';
      html += '<div class="cityhall-right">';
      html += '+------------------------+\n';
      html += '|    RISKY INVESTMENT    |\n';
      html += '+------------------------+\n';
      html += '|                        |\n';
      html += '|  Current Odds: ' + String(gameState.gambleOdds).padStart(2) + '%     |\n';
      html += '|  (rising +2%/sec)      |\n';
      html += '|  (resets to 10% on bet)|\n';
      html += '|                        |\n';
      html += '|  Bet ALL your money    |\n';
      html += '|  Win = Double it!      |\n';
      html += '|  Lose = Lose all!      |\n';
      html += '|                        |\n';
      html += '+------------------------+\n\n';
      html += '<button class="game-button" onclick="gamble()"' + (gameState.money < 1 ? ' disabled' : '') + '>[ INVEST $' + Math.floor(gameState.money) + ' ]</button>\n';
      if (gameState.gambleResult) {
        html += '\n<span class="' + (gameState.gambleResult.includes('WON') ? 'gamble-win' : 'gamble-lose') + '">' + gameState.gambleResult + '</span>';
      }
      html += '</div>';
      
      html += '</div>';
      
      html += '<div class="cityhall-center">';
      html += '\n\n\n';
      if (gameState.hasSafeCode) {
        html += '<span class="safe-art clickable" id="safe-art" onclick="openSafe()">';
        html += '        _______________\n';
        html += '       /               \\\n';
        html += '      /    UNLOCKED     \\\n';
        html += '     |   ___________    |\n';
        html += '     |  |           |   |\n';
        html += '     |  |   $   $   |   |\n';
        html += '     |  |     $     |   |\n';
        html += '     |  |   $   $   |   |\n';
        html += '     |  |___________|   |\n';
        html += '     |        O         |\n';
        html += '     |_______[=]________|\n';
        html += '     |___________________|';
        html += '</span>\n';
        html += '     [CLICK TO OPEN SAFE]';
      } else {
        html += '<span class="safe-art" id="safe-art">';
        html += '        _______________\n';
        html += '       /               \\\n';
        html += '      /                 \\\n';
        html += '     |   ___________    |\n';
        html += '     |  |           |   |\n';
        html += '     |  |   ?   ?   |   |\n';
        html += '     |  |     ?     |   |\n';
        html += '     |  |   ?   ?   |   |\n';
        html += '     |  |___________|   |\n';
        html += '     |        O         |\n';
        html += '     |_______[=]________|\n';
        html += '     |___________________|';
        html += '</span>\n';
        html += '           THE SAFE';
      }
      html += '</div>';
      
      document.getElementById('cityhall-display').innerHTML = html;
      const safeEl = document.getElementById('safe-art');
      if (safeEl) {
        const tipText = gameState.hasSafeCode ? 'Click to open and face what lies within...' : 'You need a secret code to unlock it... Try looking for the code in the Dark Dungeon.';
        safeEl.addEventListener('mouseenter', (e) => showTooltip(e, 'The Safe', null, tipText));
        safeEl.addEventListener('mousemove', moveTooltip);
        safeEl.addEventListener('mouseleave', hideTooltip);
      }
    }

    function sendToCharity() {
      const input = document.getElementById('charity-amount');
      const amount = Math.floor(Number(input ? input.value : 0));
      if (amount > 0 && gameState.money >= amount) {
        gameState.money -= amount;
        gameState.charityTotal += amount;
        const baseHP = 100;
        const charityBonus = getCharityHPBonus();
        gameState.maxHP = baseHP + charityBonus;
        updateDisplay();
        renderCityHall();
      }
    }

    function gamble() {
      if (gameState.money < 1) return;
      
      const bet = Math.floor(gameState.money);
      const roll = Math.random() * 100;
      
      if (roll < gameState.gambleOdds) {
        gameState.money += bet;
        gameState.gambleResult = 'WON! +$' + bet + '!';
      } else {
        gameState.money = 0;
        gameState.gambleResult = 'LOST $' + bet + '...';
      }
      
      gameState.gambleOdds = 10;
      
      updateDisplay();
      renderCityHall();
    }
    setInterval(function() {
      if (gameState.gambleOdds < 90) {
        gameState.gambleOdds += 2;
        if (gameState.gambleOdds > 90) gameState.gambleOdds = 90;
        const activeTab = document.querySelector('.menu-tab.active');
        if (activeTab && activeTab.getAttribute('data-tab') === 'cityhall') {
          renderCityHall();
        }
      }
    }, 1000);

    const baseCosts = {
      factory: 0,
      mine: 1000,
      shop: 0,
      arena: 0,
      academy: 0,
      nuclear: 0,
      school: 750,
      kindergarten: 500,
      windturbine: 1000,
      dungeon: 2500
    };

    function renderMap() {
const bF = gameState.buildings.factory;
      const bM = gameState.buildings.mine;
      const bS = gameState.buildings.shop;
      const bA = gameState.buildings.arena;
      const bAc = gameState.buildings.academy;
      const bN = gameState.buildings.nuclear;
      const bSch = gameState.buildings.school;
      const bK = gameState.buildings.kindergarten;
      const bW = gameState.buildings.windturbine;
      const bD = gameState.buildings.dungeon;

const costs = {
  factory: getBuildCost(baseCosts.factory),
  mine: getBuildCost(baseCosts.mine),
  shop: getBuildCost(baseCosts.shop),
  arena: baseCosts.arena,
  academy: baseCosts.academy,
  nuclear: getBuildCost(baseCosts.nuclear),
  school: getBuildCost(baseCosts.school),
  kindergarten: getBuildCost(baseCosts.kindergarten),
  windturbine: getBuildCost(baseCosts.windturbine),
  dungeon: getBuildCost(baseCosts.dungeon)
  };

      let html = '';
      
      html += '                              === CITY MAP ===                              \n\n';
      
      if (bF) {
        html += '<span class="building-built" data-tip="factory"> _____________________  </span>';
      } else {
        html += '<span class="building-locked" data-building="factory" data-cost="' + costs.factory + '" data-effect="+2 money/sec"> _____________________  </span>';
      }
      html += '                  ';
      if (bN) {

function buildBuilding(buildingId) {
      const incomes = {
        factory: 2,
        mine: 5,
        shop: 0,
        arena: 0,
        academy: 0,
        nuclear: 0,
        school: 4,
        kindergarten: 3,
        windturbine: 0,
        dungeon: 0
      };
      
      const cost = getBuildCost(baseCosts[buildingId]);
      
      if (buildingId === 'academy' && !gameState.academyUnlocked) {
        return;
      }
      
      if (gameState.money >= cost && !gameState.buildings[buildingId]) {
        gameState.money -= cost;
        gameState.buildings[buildingId] = true;
        gameState.moneyPerSecond += incomes[buildingId];
        
        if (buildingId === 'nuclear') {
          gameState.energyPer5Seconds += 1;
        }
  if (buildingId === 'windturbine') {
  gameState.energyPer5Seconds += 5;
  }
        
        hideTooltip();
        updateDisplay();
        renderMap();
      }
    }

    function startWizardFight() {
      document.getElementById('map-view').classList.add('hidden');
      document.getElementById('battle-view').classList.remove('hidden');
      initBattle('wizard');
    }

      if (dungeonState.active || dungeonState.battleOver) return;

      renderDungeon();
      dungeonState.battleInterval = setInterval(updateDungeon, 150);
    }

    function updateDungeon() {
      const d = dungeonState;
      if (!d.active || d.battleOver) return;

      d.minionSpawnTimer++;
      if (d.bossHP > 0 && d.minionSpawnTimer >= 12 && d.minions.length < 3) {
        if (Math.random() < d.spawnRate * 3) {
          d.minions.push({
            x: d.bossX - 2,
            hp: d.minionBaseHP,
            atk: d.minionBaseATK,
            speed: d.minionSpeed
          });
          d.minionSpawnTimer = 0;
          d.log = 'The witch summons a minion!';
        }
      }

      d.minions.forEach(m => {
        if (m.x > d.playerX + 4) {
          m.x -= m.speed;
        }
      });

      d.playerProjectiles = d.playerProjectiles.filter(p => {
        p.x += 3;
        for (let i = d.minions.length - 1; i >= 0; i--) {
          if (p.x >= d.minions[i].x && p.x <= d.minions[i].x + 1) {
            const dmg = Math.max(1, d.playerRangedATK - 0);
            d.minions[i].hp -= dmg;
            if (d.minions[i].hp <= 0) {
              d.minions.splice(i, 1);
              d.log = 'Minion destroyed!';
            }
            return false;
          }
        }
        if (d.bossHP > 0 && p.x >= d.bossX && p.x <= d.bossX + 2) {
          const dmg = Math.max(1, d.playerRangedATK - d.bossDEF);
          d.bossHP -= dmg;
          d.log = 'Projectile hits ' + d.bossName + ' for ' + dmg + '!';
          return false;
        }
        return p.x < 60;
      });

      if (d.playerRanged && d.shootCooldown <= 0) {
        d.playerProjectiles.push({ x: d.playerX + 3 });
        d.shootCooldown = 3;
      }
      if (d.shootCooldown > 0) d.shootCooldown--;
      let nearestTarget = d.bossHP > 0 ? d.bossX : 999;
      d.minions.forEach(m => { if (m.x < nearestTarget) nearestTarget = m.x; });

      const hasGroundedBoots = gameState.equipped.boots === 'groundedBoots';
      if (!d.inCombat && d.playerX < nearestTarget - 5 && !hasGroundedBoots) {
        d.playerX += 2;
        if (!d.playerRanged) d.log = 'Advancing...';
      } else if (hasGroundedBoots && !d.inCombat) {
        d.log = 'You stand your ground...';
      }
      for (let i = d.minions.length - 1; i >= 0; i--) {
        const m = d.minions[i];
        if (Math.abs(m.x - d.playerX) <= 4) {
          const pDmg = Math.max(1, d.playerATK);
          m.hp -= pDmg;
          const mDmg = Math.max(1, m.atk - d.playerDEF);
          d.playerHP -= mDmg;
          d.log = 'Minion deals ' + mDmg + ' to you! You deal ' + pDmg + ' to minion!';
          if (m.hp <= 0) {
            d.minions.splice(i, 1);
            d.log = 'Minion defeated!';
          }
        }
      }
      if (d.bossHP > 0 && Math.abs(d.playerX - d.bossX) <= 5 && d.minions.length === 0) {
        d.inCombat = true;
        const pDmg = Math.max(1, d.playerATK - d.bossDEF);
        d.bossHP -= pDmg;
        const bDmg = Math.max(1, d.bossATK - d.playerDEF);
        d.playerHP -= bDmg;
        d.log = 'You deal ' + pDmg + ' to ' + d.bossName + '! She deals ' + bDmg + ' to you!';
      }
      if (d.bossHP <= 0 && d.minions.length === 0) {
        d.battleOver = true;
        d.active = false;
        clearInterval(d.battleInterval);
        const moneyReward = 150 + (d.bossLevel * 80);
        gameState.money += moneyReward;
        let extraMsg = '';
        
        if (d.bossLevel === 5) {
          if (!gameState.shopItems.groundedBoots.bought) {
            gameState.shopItems.groundedBoots.bought = true;
            gameState.inventory.push('groundedBoots');
            extraMsg = ' GOT: Grounded Boots';
          }
          if (!gameState.hasSafeCode) {
            gameState.hasSafeCode = true;
            extraMsg += ' + Secret Safe Code!';
          }
        }
        
        gameState.dungeonLevel = (gameState.dungeonLevel || 1) + 1;
        d.log = 'VICTORY! ' + d.bossName + ' defeated! +$' + moneyReward + '.' + extraMsg;
        updateDisplay();
      }

      if (d.playerHP <= 0) {
        d.battleOver = true;
        d.active = false;
        clearInterval(d.battleInterval);
        d.log = 'Defeated by ' + d.bossName + '... The dungeon claims another soul.';
      }

      renderDungeon();
    }

          fieldArr[Math.floor(p.x)] = '*';

      });
      b.playerProjectiles.forEach(p => {
        if (p.x >= 0 && p.x < 60) {
          fieldArr[Math.floor(p.x)] = 'o';
        }
      });

        fieldArr[b.playerX + 2] = '/';
      }
      
if (b.enemyType === 'wizard') {
        if (b.enemyX >= 0 && b.enemyX + 2 < 60) {
          fieldArr[b.enemyX] = '/';
          fieldArr[b.enemyX + 1] = '|';

          fieldArr[b.enemyX] = '(';
          fieldArr[b.enemyX + 1] = 'O';
          fieldArr[b.enemyX + 2] = ')';

      }

    function createHPBar(current, max, width) {
      const filled = Math.round((Math.max(0, current) / max) * width);
      let bar = '[';
      for (let i = 0; i < width; i++) {
        bar += i < filled ? '#' : '-';
      }
      bar += '] ' + Math.max(0, Math.floor(current)) + '/' + max;
      return bar;
    }

    function startBattle() {
      if (battleState.active || battleState.battleOver) return;
      
      battleState.active = true;
      battleState.log = 'Battle started! You advance...';
      renderBattle();
      
      battleState.battleInterval = setInterval(updateBattle, 150);
    }

    function updateBattle() {
      const b = battleState;
      
      b.projectiles = b.projectiles.filter(p => {
        p.x -= 3;
        if (p.x <= b.playerX + 2 && p.x >= b.playerX) {
          const dmg = Math.max(1, b.enemyATK - b.playerDEF);
          b.playerHP -= dmg;
          b.log = 'Projectile hits you for ' + dmg + ' dmg!';
          return false;
        }
        return p.x > 0;
      });
      
      b.playerProjectiles = b.playerProjectiles.filter(p => {
        p.x += 3;
        if (p.x >= b.enemyX && p.x <= b.enemyX + 2) {
          const dmg = Math.max(1, b.playerRangedATK - b.enemyDEF);
          b.enemyHP -= dmg;
          b.log = 'Your projectile hits for ' + dmg + ' dmg!';
          return false;
        }
        return p.x < 60;
      });
      
      if (b.enemyType === 'wizard' && !b.battleOver && !b.inCombat) {
        if (Math.random() < 0.3) {
          b.projectiles.push({ x: b.enemyX - 1 });
        }
      }
      
      if (b.playerRanged && !b.battleOver && b.shootCooldown <= 0) {
        const distance = b.enemyX - b.playerX;
        if (distance > 8) {
          b.playerProjectiles.push({ x: b.playerX + 3 });
          b.shootCooldown = 3;
        }
      }
      if (b.shootCooldown > 0) b.shootCooldown--;
      
      const hasGroundedBoots = gameState.equipped.boots === 'groundedBoots';
      if (!b.inCombat && b.playerX < b.enemyX - 5 && !hasGroundedBoots) {
        b.playerX += 2;
        if (!b.playerRanged) {
          b.log = 'Advancing...';
        }
      } else if (hasGroundedBoots && !b.inCombat) {
        b.log = 'You stand your ground...';
      } else {
        b.inCombat = true;
      }

if (b.inCombat && !b.battleOver) {
        let playerDmg;
        if (b.playerRanged) {
          playerDmg = Math.max(1, b.playerATK - b.enemyDEF);
        } else {
          playerDmg = Math.max(1, b.playerATK - b.enemyDEF);
        }
        b.enemyHP -= playerDmg;
        
        if (b.enemyType === 'chest') {
          b.log = 'You deal ' + playerDmg + ' dmg! The chest just sits there...';
        } else {
          const enemyDmg = Math.max(1, b.enemyATK - b.playerDEF);
          b.playerHP -= enemyDmg;
          b.log = 'You deal ' + playerDmg + ' dmg! ' + b.enemyName + ' deals ' + enemyDmg + ' dmg!';
        }
        
        if (b.enemyHP <= 0) {
          b.battleOver = true;
          b.active = false;
          clearInterval(b.battleInterval);
          
if (b.enemyType === 'wizard') {
            gameState.academyUnlocked = true;
            gameState.buildings.academy = true;
            if (!gameState.shopItems.staff.bought) {
              gameState.shopItems.staff.bought = true;
              gameState.inventory.push('staff');
              b.log = 'Victory! Academy unlocked! Got Wizard Staff!';
            } else {
              b.log = 'Victory! Academy is now unlocked!';
            }
          } else if (b.enemyType === 'chest') {
            const moneyDrop = 100 + Math.floor(Math.random() * 100);
            gameState.money += moneyDrop;
            
            let lootMsg = 'TREASURE! +$' + moneyDrop;
            const chestItems = ['goldenKey', 'ancientCoin', 'rubyGem', 'emeraldShard'];
            const unownedItems = chestItems.filter(item => !gameState.battleDrops.includes(item));
            if (unownedItems.length > 0) {
              const droppedItem = unownedItems[Math.floor(Math.random() * unownedItems.length)];
              gameState.battleDrops.push(droppedItem);
              const itemNames = {
                goldenKey: 'Golden Key',
                ancientCoin: 'Ancient Coin',
                rubyGem: 'Ruby Gem',
                emeraldShard: 'Emerald Shard'
              };
              lootMsg += ' and ' + itemNames[droppedItem] + '!';
            }
            b.log = lootMsg;
          } else {
            const moneyDrop = 20 + Math.floor(Math.random() * 30);
            gameState.money += moneyDrop;
            
            let lootMsg = 'Victory! +$' + moneyDrop;
            if (Math.random() < 0.3 && !gameState.battleDrops.includes('slimeGel')) {
              gameState.battleDrops.push('slimeGel');
              lootMsg += ' and Slime Gel!';
            }
            b.log = lootMsg;
          }
          updateDisplay();
        }
        
        if (b.playerHP <= 0) {
          b.battleOver = true;
          b.active = false;
          clearInterval(b.battleInterval);
          b.log = 'Defeated! Better luck next time...';
        }
      }

      renderBattle();
    }

      let armorArt;
      if (gameState.equipped.armor === 'plateArmor') {
        armorArt = [
          '              ',
          '       /===\\  ',
          '      |+===+| ',
          '      |+ + +| ',
          '      |+   +| ',
          '       \\===/  ',
          '              '
        ];
      } else if (gameState.equipped.armor === 'shield') {
        armorArt = [
          '              ',
          '       ,---.  ',
          '      /     \\ ',
          '     |   +   |',
          '      \\     / ',
          "       '---'  ",
          '              '
        ];
      } else {
        armorArt = [
          '              ',
          '              ',
          '     (empty)  ',
          '              ',
          '              ',
          '              ',
          '              '
        ];
      }

      let bootsArt;
      if (gameState.equipped.boots === 'speedBoots') {
        bootsArt = [
          '      _/\\_/\\_ ',
          '     |*    *| ',
          '     |* ** *| ',
          '     |*    *| ',
          '     |______| ',
          '              ',

        ];
      } else if (gameState.equipped.boots === 'boots') {
        bootsArt = [
          '              ',
          '    __    __  ',
          '   /  \\  /  \\ ',
          '  |    ||    |',
          '  |____||____|',
          '              ',
          '              '
        ];
      } else if (gameState.equipped.boots === 'groundedBoots') {
        bootsArt = [
          '              ',
          '   ___    ___ ',
          '  |###|  |###|',
          '  |###|  |###|',
          '  |___|  |___|',
          ' ====== ======',
          '              '
        ];
      } else {
        bootsArt = [
          '              ',
          '              ',
          '     (empty)  ',
          '              ',
          '              ',
          '              ',
          '              '
        ];
      }

      const ownedSkills = [];
      const skills = gameState.skills || {};
      if (skills.fastMoney2 && skills.fastMoney2.owned) ownedSkills.push(skills.fastMoney2.name);
      else if (skills.fastMoney && skills.fastMoney.owned) ownedSkills.push(skills.fastMoney.name);
      
      if (skills.strongArm2 && skills.strongArm2.owned) ownedSkills.push(skills.strongArm2.name);
      else if (skills.strongArm && skills.strongArm.owned) ownedSkills.push(skills.strongArm.name);
      
      if (skills.toughSkin2 && skills.toughSkin2.owned) ownedSkills.push(skills.toughSkin2.name);
      else if (skills.toughSkin && skills.toughSkin.owned) ownedSkills.push(skills.toughSkin.name);
      
      if (skills.cheapBuilds2 && skills.cheapBuilds2.owned) ownedSkills.push(skills.cheapBuilds2.name);
      else if (skills.cheapBuilds && skills.cheapBuilds.owned) ownedSkills.push(skills.cheapBuilds.name);
      
      const lootNames = {
        slimeGel: 'Slime Gel',
        goldenKey: 'Golden Key',
        ancientCoin: 'Ancient Coin',
        rubyGem: 'Ruby Gem',
        emeraldShard: 'Emerald Shard'
      };
      const lootItems = gameState.battleDrops.map(d => lootNames[d] || d);

      let html = '';
      
      html += '+--------------------+  +--------------------+  +------------------+\n';
      html += '|       WEAPON       |  |         HAT        |  |     SKILLS       |\n';
      html += '+--------------------+  +--------------------+  +------------------+\n';
      
      html += '|' + makeSelect('weapon', weaponItems) + '   |  |' + makeSelect('hat', hatItems) + '    |  |';
      if (ownedSkills[0]) html += ' ' + ownedSkills[0].padEnd(16) + ' |\n';
      else html += '   (none yet)     |\n';
      
      html += '|' + weaponArt[0] + '      |  |' + hatArt[0] + '      |  |';
      if (ownedSkills[1]) html += ' ' + ownedSkills[1].padEnd(16) + ' |\n';
      else html += '                  |\n';
      
      html += '|' + weaponArt[1] + '      |  |' + hatArt[1] + '      |  |';
      if (ownedSkills[2]) html += ' ' + ownedSkills[2].padEnd(16) + ' |\n';
      else html += '                  |\n';
      
      html += '|' + weaponArt[2] + '      |  |' + hatArt[2] + '      |  |';
      if (ownedSkills[3]) html += ' ' + ownedSkills[3].padEnd(16) + ' |\n';
      else html += '                  |\n';
      
      html += '|' + weaponArt[3] + '      |  |' + hatArt[3] + '      |  +------------------+\n';
      html += '|' + weaponArt[4] + '      |  |' + hatArt[4] + '      |\n';
      html += '|' + weaponArt[5] + '      |  |' + hatArt[5] + '      |  +------------------+\n';
      html += '|' + weaponArt[6] + '      |  |' + hatArt[6] + '      |  |      LOOT        |\n';
      html += '+--------------------+  +--------------------+  +------------------+\n';
      html += '                                                |';
      if (lootItems[0]) html += ' ' + lootItems[0].padEnd(16) + ' |\n';
      else html += '   (none yet)     |\n';
      
      html += '+--------------------+  +--------------------+  |';
      if (lootItems[1]) html += ' ' + lootItems[1].padEnd(16) + ' |\n';
      else html += '                  |\n';
      
      html += '|     BODY ARMOR     |  |       BOOTS        |  |';
      if (lootItems[2]) html += ' ' + lootItems[2].padEnd(16) + ' |\n';
      else html += '                  |\n';
      
      html += '+--------------------+  +--------------------+  |';
      if (lootItems[3]) html += ' ' + lootItems[3].padEnd(16) + ' |\n';
      else html += '                  |\n';
      
      html += '|' + makeSelect('armor', armorItems) + '   |  |' + makeSelect('boots', bootsItems) + '    |  +------------------+\n';
      
      html += '|' + armorArt[0] + '      |  |' + bootsArt[0] + '      |\n';
      html += '|' + armorArt[1] + '      |  |' + bootsArt[1] + '      |\n';
      html += '|' + armorArt[2] + '      |  |' + bootsArt[2] + '      |\n';
      html += '|' + armorArt[3] + '      |  |' + bootsArt[3] + '      |\n';
      html += '|' + armorArt[4] + '      |  |' + bootsArt[4] + '      |\n';
      html += '|' + armorArt[5] + '      |  |' + bootsArt[5] + '      |\n';
      html += '|' + armorArt[6] + '      |  |' + bootsArt[6] + '      |\n';
      html += '+--------------------+  +--------------------+\n\n';
      
      html += '+----------------------------------------------+\n';
      html += '|  HP: ' + String(gameState.maxHP).padEnd(5) + ' ATK: ' + String(stats.attack).padEnd(4) + ' DEF: ' + String(stats.defense).padEnd(4);
      if (stats.ranged) {
        html += ' RANGED: ' + String(stats.rangedAttack).padEnd(3) + '   |\n';
      } else {
        html += '             |\n';
      }
      html += '+----------------------------------------------+';

      document.getElementById('inventory-display').innerHTML = html;
    }

    function equipItem(slot, itemId) {
      gameState.equipped[slot] = itemId || null;
      renderInventory();
    }

    function goToCityHall() {
      const menuTabs = document.querySelectorAll('.menu-tab');
      const contentSections = document.querySelectorAll('.content-section');
      
      menuTabs.forEach(t => t.classList.remove('active'));
      document.querySelector('[data-tab="cityhall"]').classList.add('active');
      contentSections.forEach(section => section.classList.remove('active'));
      document.getElementById('cityhall-content').classList.add('active');
      renderCityHall();
    }

    const menuTabs = document.querySelectorAll('.menu-tab');
    const contentSections = document.querySelectorAll('.content-section');

    menuTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        menuTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        contentSections.forEach(section => section.classList.remove('active'));
        
        const tabName = tab.getAttribute('data-tab');
        document.getElementById(tabName + '-content').classList.add('active');
        
        if (tabName === 'map') {
          document.getElementById('map-view').classList.remove('hidden');
          document.getElementById('shop-view').classList.add('hidden');
          document.getElementById('skills-view').classList.add('hidden');
          document.getElementById('battle-view').classList.add('hidden');
          document.getElementById('dungeon-view').classList.add('hidden');
          renderMap();
        }
        if (tabName === 'inventory') {
          renderInventory();
        }
        if (tabName === 'cityhall') {
          renderCityHall();
        }
        if (tabName === 'settings') {
          renderSettings();
        }
      });
    });

    function updateDisplay() {
      document.getElementById('money').textContent = Math.floor(gameState.money);
      document.getElementById('energy').textContent = Math.floor(gameState.energy);
    }

    function generateResources() {
      gameState.money += gameState.moneyPerSecond / 10;
      updateDisplay();
    }

    let energyTickCount = 0;
    function generateEnergy() {
      energyTickCount++;
      if (energyTickCount >= 50) {
        gameState.energy += gameState.energyPer5Seconds;
        energyTickCount = 0;
        updateDisplay();
      }
    }

    function saveGame() {
      localStorage.setItem('citybox_save', JSON.stringify({
        money: gameState.money,
        energy: gameState.energy,
        moneyPerSecond: gameState.moneyPerSecond,
        energyPer5Seconds: gameState.energyPer5Seconds,
        charityTotal: gameState.charityTotal,
        gambleOdds: gameState.gambleOdds,
        buildings: gameState.buildings,
        academyUnlocked: gameState.academyUnlocked,
        inventory: gameState.inventory,
        equipped: gameState.equipped,
        shopItems: gameState.shopItems,
        skills: gameState.skills,
        battleDrops: gameState.battleDrops,
        maxHP: gameState.maxHP,
        dungeonLevel: gameState.dungeonLevel || 1,
        hasSafeCode: gameState.hasSafeCode || false
      }));
    }

    function loadGame() {
      const data = localStorage.getItem('citybox_save');
      if (data) {
        const p = JSON.parse(data);
        gameState.money = p.money || 0;
        gameState.energy = p.energy || 0;
        gameState.moneyPerSecond = p.moneyPerSecond || 1;
        gameState.energyPer5Seconds = p.energyPer5Seconds || 0;
        gameState.charityTotal = p.charityTotal || 0;
        gameState.gambleOdds = p.gambleOdds || 10;
        gameState.buildings = p.buildings || { factory: false, mine: false, shop: false, arena: false, academy: false, nuclear: false, school: false, kindergarten: false, windturbine: false, dungeon: false };
        gameState.academyUnlocked = p.academyUnlocked || false;
        gameState.inventory = p.inventory || [];
        gameState.equipped = p.equipped || { weapon: null, hat: null, armor: null, boots: null };
        gameState.shopItems = p.shopItems || gameState.shopItems;
        gameState.skills = p.skills || gameState.skills;
        gameState.battleDrops = p.battleDrops || [];
        gameState.dungeonLevel = p.dungeonLevel || 1;
        gameState.hasSafeCode = p.hasSafeCode || false;
        const charityBonus = getCharityHPBonus();
        gameState.maxHP = 100 + charityBonus;
        updateDisplay();
        renderCityHall();
      }
    }

    function renderSettings() {
      let html = 'GAME CONTROLS\n';
      html += '-------------\n';
      html += 'SAVE  - Save your current progress\n';
      html += 'LOAD  - Load your previously saved game\n';
      html += 'RESET - Start a new game\n\n';
      
      html += '<label style="cursor:pointer;">';
      html += '<input type="checkbox" id="autosave-toggle" ' + (gameState.autosaveEnabled ? 'checked' : '') + ' onchange="toggleAutosave()">';
      html += ' Auto-save every 30 seconds';
      html += '</label>\n\n';
      
      html += '--------------------\n';
      html += 'EXPORT / IMPORT SAVE\n';
      html += '--------------------\n';
      html += 'Copy this string to save your progress elsewhere:\n\n';
      html += '<textarea id="export-data" style="width:400px;height:80px;background:#1a1a1a;color:#c0c0c0;border:1px solid #444;font-family:monospace;font-size:10px;" readonly onclick="this.select()">' + exportSave() + '</textarea>\n\n';
      html += '<button class="game-button" onclick="copyExport()">[ COPY TO CLIPBOARD ]</button>\n\n';
      html += 'Paste a save string here to import:\n\n';
      html += '<textarea id="import-data" style="width:400px;height:80px;background:#1a1a1a;color:#c0c0c0;border:1px solid #444;font-family:monospace;font-size:10px;" placeholder="Paste save string here..."></textarea>\n\n';
      html += '<button class="game-button" onclick="importSave()">[ IMPORT SAVE ]</button>';
      
      document.getElementById('settings-display').innerHTML = html;
    }

    function toggleAutosave() {
      gameState.autosaveEnabled = !gameState.autosaveEnabled;
    }

    function exportSave() {
      const saveData = {
        money: gameState.money,
        energy: gameState.energy,
        moneyPerSecond: gameState.moneyPerSecond,
        energyPer5Seconds: gameState.energyPer5Seconds,
        charityTotal: gameState.charityTotal,
        gambleOdds: gameState.gambleOdds,
        buildings: gameState.buildings,
        academyUnlocked: gameState.academyUnlocked,
        inventory: gameState.inventory,
        equipped: gameState.equipped,
        shopItems: gameState.shopItems,
        skills: gameState.skills,
        battleDrops: gameState.battleDrops,
        maxHP: gameState.maxHP,
        dungeonLevel: gameState.dungeonLevel || 1,
        hasSafeCode: gameState.hasSafeCode || false
      };
      return btoa(JSON.stringify(saveData));
    }

    function copyExport() {
      const textarea = document.getElementById('export-data');
      textarea.select();
      document.execCommand('copy');
      alert('Save string copied to clipboard!');
    }

    function importSave() {
      const importData = document.getElementById('import-data').value.trim();
      if (!importData) {
        alert('Please paste a save string first!');
        return;
      }
      try {
        const decoded = atob(importData);
        const p = JSON.parse(decoded);
        gameState.money = p.money || 0;
        gameState.energy = p.energy || 0;
        gameState.moneyPerSecond = p.moneyPerSecond || 1;
        gameState.energyPer5Seconds = p.energyPer5Seconds || 0;
        gameState.charityTotal = p.charityTotal || 0;
        gameState.gambleOdds = p.gambleOdds || 10;
        gameState.buildings = p.buildings || gameState.buildings;
        gameState.academyUnlocked = p.academyUnlocked || false;
        gameState.inventory = p.inventory || [];
        gameState.equipped = p.equipped || { weapon: null, hat: null, armor: null, boots: null };
        gameState.shopItems = p.shopItems || gameState.shopItems;
        gameState.skills = p.skills || gameState.skills;
        gameState.battleDrops = p.battleDrops || [];
        gameState.dungeonLevel = p.dungeonLevel || 1;
        gameState.hasSafeCode = p.hasSafeCode || false;
        const charityBonus = getCharityHPBonus();
        gameState.maxHP = 100 + charityBonus;
        updateDisplay();
        renderCityHall();
        renderSettings();
        alert('Save imported successfully!');
      } catch (e) {
        alert('Invalid save string! Please check and try again.');
      }
    }

    function resetGame() {
      gameState.money = 0;
      gameState.energy = 0;
      gameState.moneyPerSecond = 1;
      gameState.energyPer5Seconds = 0;
      gameState.charityTotal = 0;
      gameState.gambleOdds = 10;
      gameState.gambleResult = '';
      gameState.buildings = { factory: false, mine: false, shop: false, arena: false, academy: false, nuclear: false, school: false, kindergarten: false, windturbine: false, dungeon: false };
      gameState.academyUnlocked = false;
      gameState.inventory = [];
      gameState.equipped = { weapon: null, hat: null, armor: null, boots: null };
gameState.shopItems = {
        sword: { bought: false, cost: 50, name: 'Wooden Sword', slot: 'weapon', attack: 3, defense: 0, ranged: false },
        shield: { bought: false, cost: 75, name: 'Iron Shield', slot: 'armor', attack: 0, defense: 5, ranged: false },
        hat: { bought: false, cost: 40, name: 'Leather Cap', slot: 'hat', attack: 0, defense: 2, ranged: false },
        boots: { bought: false, cost: 60, name: 'Travel Boots', slot: 'boots', attack: 0, defense: 2, ranged: false },
        staff: { bought: false, cost: 0, name: 'Wizard Staff', slot: 'weapon', attack: 2, defense: 0, ranged: true, rangedAttack: 8 },
        steelSword: { bought: false, cost: 200, name: 'Steel Sword', slot: 'weapon', attack: 8, defense: 0, ranged: false, tier2: true },
        plateArmor: { bought: false, cost: 250, name: 'Plate Armor', slot: 'armor', attack: 0, defense: 10, ranged: false, tier2: true },
        wizardHat: { bought: false, cost: 180, name: 'Wizard Hat', slot: 'hat', attack: 2, defense: 4, ranged: false, tier2: true },
        speedBoots: { bought: false, cost: 220, name: 'Speed Boots', slot: 'boots', attack: 1, defense: 5, ranged: false, tier2: true },
  groundedBoots: { bought: false, cost: 0, name: 'Grounded Boots', slot: 'boots', attack: 0, defense: 3, ranged: false, grounded: true }
  };
  gameState.skills = {
    fastMoney: { owned: false, moneyCost: 150, energyCost: 20, name: 'Fast Money', effect: '+1 money/sec', bonus: 1, tier: 1 },
    cheapBuilds: { owned: false, moneyCost: 200, energyCost: 30, name: 'Cheap Builds', effect: '-20% build cost', discount: 0.2, tier: 1 },
    strongArm: { owned: false, moneyCost: 180, energyCost: 25, name: 'Strong Arm', effect: '+2 base attack', attack: 2, tier: 1 },
    toughSkin: { owned: false, moneyCost: 180, energyCost: 25, name: 'Tough Skin', effect: '+2 base defense', defense: 2, tier: 1 },
    fastMoney2: { owned: false, moneyCost: 400, energyCost: 50, name: 'Fast Money II', effect: '+3 money/sec', bonus: 3, tier: 2, requires: 'fastMoney' },
    cheapBuilds2: { owned: false, moneyCost: 500, energyCost: 60, name: 'Cheap Builds II', effect: '-15% more build cost', discount: 0.15, tier: 2, requires: 'cheapBuilds' },
    strongArm2: { owned: false, moneyCost: 450, energyCost: 55, name: 'Strong Arm II', effect: '+4 base attack', attack: 4, tier: 2, requires: 'strongArm' },
    toughSkin2: { owned: false, moneyCost: 450, energyCost: 55, name: 'Tough Skin II', effect: '+4 base defense', defense: 4, tier: 2, requires: 'toughSkin' }
  };
  gameState.battleDrops = [];
  gameState.maxHP = 100;
  gameState.dungeonLevel = 1;
  gameState.hasSafeCode = false;
      localStorage.removeItem('citybox_save');
      updateDisplay();
      renderCityHall();
      renderMap();
    }

  setInterval(function() {
    if (gameState.autosaveEnabled) saveGame();
  }, 30000);
  setInterval(generateResources, 100);
  setInterval(generateEnergy, 100);

  window.addEventListener('load', () => {
  loadGame();
  updateDisplay();
  renderCityHall();
  renderMap();
  renderSettings();
  });
  </script>
  <div id="ending-overlay" class="hidden"></div>
</body>
</html>
